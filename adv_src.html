<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://www.gstatic.com/images/branding/searchlogo/ico/favicon.ico" rel="icon">
    <link rel="stylesheet" href="styles.css">
    <title>Advanced Search</title>
</head>

<body>

    <header class="header-advanced">
      <div class="header-left">
            <a href="index.html" class="tooltip">
                <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_92x30dp.png"
                class="logo-btn"
                alt="Google">
            </a>
        </div>
        <div class="header-right">
            <a href="index.html">Home</a>
            <a href="adv_src.html">Advanced</a>
        </div>
    </header>

    <div class="advanced-title">
        <h1>Advanced Search</h1>
    </div>

    <div class="underline"></div>

    <div class="advanced-main">

        <form action="https://www.google.com/search" method="GET" class="advanced-form">

            <div class="field-group">
                <label for="allwords">All these words:</label>
                <input type="text" id="allwords" name="as_q">
            </div>

                <div class="field-group">
                <label for="exactphrase">This exact word or phrase:</label>
                <input type="text" id="exactphrase" name="as_epq">
            </div>

            <div class="field-group">
                <label for="anywords">Any of these words:</label>
                <input type="text" id="anywords" name="as_oq">
            </div>

            <div class="field-group">
                <label for="nonewords">None of these words:</label>
                <input type="text" id="nonewords" name="as_eq">
            </div>

            <div class="range-row">
                <label for="numbersrange">Numbers range:</label>
                <input type="text" id="numbersrange" name="as_nlo" placeholder="from">
                <input type="text" name="as_nhi" placeholder="to">
            </div>

            <div class="buttons">
                <input class="advbtn" type="submit" value="Advanced Search">
            </div>
        </form>
    </div>


</body>

</html>
